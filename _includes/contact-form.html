<div class="form-card" id="contactFormCard">
  <form action="https://formspree.io/f/xqedrddj" method="POST" id="cForm" novalidate>
    <input type="hidden" name="_subject" value="New consultation request — apexdata.cloud">
    <div class="form-row">
      <div class="field"><label for="c_first">First name</label><input type="text" id="c_first" name="first_name" placeholder="Jane" required autocomplete="given-name"></div>
      <div class="field"><label for="c_last">Last name</label><input type="text" id="c_last" name="last_name" placeholder="Smith" required autocomplete="family-name"></div>
    </div>
    <div class="field"><label for="c_email">Work email</label><input type="email" id="c_email" name="email" placeholder="jane@company.com" required autocomplete="email"></div>
    <div class="field"><label for="c_company">Company</label><input type="text" id="c_company" name="company" placeholder="Company name" autocomplete="organization"></div>
    <div class="field">
      <label for="c_interest">What can we help with?</label>
      <select id="c_interest" name="interest">
        <option value="">Select…</option>
        <option>AI Consulting</option>
        <option>Machine Learning</option>
        <option>Generative AI / RAG</option>
        <option>AI Agents</option>
        <option>Data Engineering</option>
        <option>Data Governance</option>
        <option>Cloud Architecture</option>
        <option>Customer Segmentation</option>
        <option>Marketing Analytics</option>
        <option>Not sure yet</option>
      </select>
    </div>
    <div class="field"><label for="c_message">Your challenge or objective</label><textarea id="c_message" name="message" rows="4" placeholder="Briefly describe what you're trying to achieve…"></textarea></div>
    <button type="submit" class="cf-submit" id="cSubmit">Send it over &#8594;</button>
    <p style="font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--faint);margin-top:14px;text-align:center;">We respond within one business day.</p>
  </form>
  <div class="form-success" id="cSuccess">
    <h3 style="font-family:var(--serif);font-weight:440;font-size:1.4rem;color:var(--paper);margin-bottom:10px;">Thank you — question received.</h3>
    <p style="color:var(--dim);">We'll be in touch within one business day. For anything urgent, email <a href="mailto:ezequiel@apexdata.cloud">ezequiel@apexdata.cloud</a>.</p>
  </div>
</div>

<script>
(function(){
  var f=document.getElementById('cForm'), s=document.getElementById('cSuccess'), b=document.getElementById('cSubmit');
  if(!f) return;
  f.addEventListener('submit',function(e){
    e.preventDefault(); b.textContent='Sending…'; b.disabled=true;
    fetch(f.action,{method:'POST',body:new FormData(f),headers:{'Accept':'application/json'}})
      .then(function(r){ if(r.ok){ f.style.display='none'; s.style.display='block'; if(typeof gtag!=='undefined'){gtag('event','generate_lead',{event_category:'Contact',event_label:'Contact Form'});} }
        else { b.textContent='Send Message →'; b.disabled=false; alert('There was an error. Please email ezequiel@apexdata.cloud'); } })
      .catch(function(){ b.textContent='Send Message →'; b.disabled=false; alert('There was an error. Please email ezequiel@apexdata.cloud'); });
  });
})();
</script>
