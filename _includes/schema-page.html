{%- comment -%} Build breadcrumb trail from page.url segments {%- endcomment -%}
{%- assign segments = page.url | remove_first: "/" | remove: "index.html" | split: "/" -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "BreadcrumbList",
      "@id": "{{ site.url }}{{ page.url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url }}/"
        }{%- assign crumb_path = "" -%}{%- for seg in segments -%}{%- assign crumb_path = crumb_path | append: "/" | append: seg -%}{%- if forloop.last -%}{%- assign crumb_name = page.title | split: "|" | first | strip | replace: '"', '' -%}{%- else -%}{%- assign crumb_name = seg | replace: "-", " " | capitalize -%}{%- endif -%},
        {
          "@type": "ListItem",
          "position": {{ forloop.index | plus: 1 }},
          "name": "{{ crumb_name }}",
          "item": "{{ site.url }}{{ crumb_path }}/"
        }{%- endfor -%}
      ]
    }{% if page.service %},
    {
      "@type": "Service",
      "@id": "{{ site.url }}{{ page.url }}#service",
      "name": "{{ page.service.name | default: page.title | split: '|' | first | strip }}",
      "serviceType": "{{ page.service.type | default: page.service.name }}",
      "description": "{{ page.description }}",
      "url": "{{ site.url }}{{ page.url }}",
      "provider": { "@id": "{{ site.url }}/#organization" },
      "areaServed": [
        { "@type": "City", "name": "Orlando" },
        { "@type": "State", "name": "Florida" },
        { "@type": "Country", "name": "United States" }
      ]{% if page.service.offers %},
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "{{ page.service.name }} deliverables",
        "itemListElement": [
          {% for o in page.service.offers %}{ "@type": "Offer", "itemOffered": { "@type": "Service", "name": "{{ o }}" } }{% unless forloop.last %},{% endunless %}{% endfor %}
        ]
      }{% endif %}
    }{% endif %}{% if page.faqs %},
    {
      "@type": "FAQPage",
      "@id": "{{ site.url }}{{ page.url }}#faq",
      "mainEntity": [
        {% for f in page.faqs %}{
          "@type": "Question",
          "name": {{ f.q | jsonify }},
          "acceptedAnswer": { "@type": "Answer", "text": {{ f.a | jsonify }} }
        }{% unless forloop.last %},{% endunless %}{% endfor %}
      ]
    }{% endif %}{% if page.layout == "post" or page.article %},
    {
      "@type": "{{ page.article_type | default: 'Article' }}",
      "@id": "{{ site.url }}{{ page.url }}#article",
      "headline": "{{ page.title | split: '|' | first | strip }}",
      "description": "{{ page.description }}",
      "image": "{{ page.image | default: site.logo | prepend: site.url }}",
      "url": "{{ site.url }}{{ page.url }}",
      "datePublished": "{{ page.date | default: site.time | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | default: site.time | date_to_xmlschema }}",
      "author": { "@type": "{{ page.author_type | default: 'Organization' }}", "name": "{{ page.author | default: site.author }}" },
      "publisher": { "@id": "{{ site.url }}/#organization" },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ site.url }}{{ page.url }}" }{% if page.about %},
      "about": [{% for a in page.about %}{ "@type": "Thing", "name": "{{ a }}" }{% unless forloop.last %},{% endunless %}{% endfor %}]{% endif %}
    }{% endif %}{% if page.defines %},
    {
      "@type": "DefinedTerm",
      "@id": "{{ site.url }}{{ page.url }}#term",
      "name": "{{ page.defines }}",
      "description": "{{ page.description }}",
      "inDefinedTermSet": { "@type": "DefinedTermSet", "name": "Apex Data Cloud AI & Data Glossary", "url": "{{ site.url }}/glossary/" }
    }{% endif %}
  ]
}
</script>
